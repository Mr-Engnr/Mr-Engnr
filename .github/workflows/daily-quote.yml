name: Daily Quote Update

on:
  schedule:
    - cron: '15 0 * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repo
        uses: actions/checkout@v4

      - name: Fetch a random quote
        id: quote
        run: |
          RESPONSE=$(curl -sk --max-time 10 https://zenquotes.io/api/random || echo "")
          QUOTE=$(echo "$RESPONSE" | jq -r '.[0].q' 2>/dev/null)
          AUTHOR=$(echo "$RESPONSE" | jq -r '.[0].a' 2>/dev/null)
          TODAY=$(date -u '+%Y-%m-%d')

          if [ -z "$QUOTE" ] || [ "$QUOTE" = "null" ]; then
            QUOTE="Build things that matter."
            AUTHOR="Unknown"
          fi

          {
            echo "quote_text<<DELIM"
            echo "$QUOTE"
            echo "DELIM"
            echo "quote_author<<DELIM"
            echo "$AUTHOR"
            echo "DELIM"
            echo "update_date=$TODAY"
          } >> "$GITHUB_OUTPUT"

      - name: Update README.md with the quote
        env:
          QUOTE: ${{ steps.quote.outputs.quote_text }}
          AUTHOR: ${{ steps.quote.outputs.quote_author }}
          DATE: ${{ steps.quote.outputs.update_date }}
        run: |
          python3 - <<'PYEOF'
          import re, os
          quote  = os.environ['QUOTE']
          author = os.environ['AUTHOR']
          date   = os.environ['DATE']
          block  = f"\n## Quote of the Day 🚀\n\n> {quote}  \n> — {author}\n*(Updated: {date})*\n"
          with open("README.md", "r") as f:
              content = f.read()
          if "## Quote of the Day" in content:
              content = re.sub(r"\n## Quote of the Day[^\n]*\n.*?(?=\n## |\Z)", block, content, flags=re.DOTALL)
          else:
              content += block
          with open("README.md", "w") as f:
              f.write(content)
          PYEOF

      - name: Commit the change
        run: |
          git config user.name  "Mr-Engnr"
          git config user.email "ranasaad727@gmail.com"
          git add README.md
          git commit -m "chore: daily quote of the day $(date -u '+%Y-%m-%d')" || echo "No changes"
          git push
